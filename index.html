<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bacon Storage</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Bacon Storage</h1>
    </header>
    <main>
        <p>Scripts.</p>
        <pre id="script-content"></pre>
    </main>
    <footer>
        <p>© 2024 Bacon Storage</p>
    </footer>
    <script>
        fetch('Scripts/')
            .then(response => response.text())
            .then(data => {
                document.getElementById('script-content').textContent = data;
            })
            .catch(error => console.error('Error fetching script:', error));
    </script>
</body>
</html>
